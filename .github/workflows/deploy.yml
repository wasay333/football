name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository_owner }}/football-app

jobs:
  # ── Run on every push / PR ────────────────────────────────────────────────
  lint:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: TypeScript check
        run: npx tsc --noEmit

  # ── Only runs when code is merged to main ─────────────────────────────────
  build-and-deploy:
    name: Build image & deploy
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write   # needed to push to ghcr.io

    steps:
      - uses: actions/checkout@v4

      # Set up Docker Buildx for layer caching
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Log in to GitHub Container Registry
      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and push — uses layer cache to speed up subsequent builds
      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache
          cache-to:   type=registry,ref=${{ env.IMAGE }}:buildcache,mode=max

      # SSH into VPS, pull the new image, restart app, migrate DB
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     22
          script: |
            set -e
            cd /opt/football

            # Pull the freshly built image
            echo "${{ secrets.GHCR_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker compose pull app

            # Ensure postgres is running and healthy first
            docker compose up -d postgres
            sleep 8

            # Run pending migrations using the project's prisma version
            docker compose run --rm app node node_modules/prisma/build/index.js migrate deploy

            # Start/restart app and nginx
            docker compose up -d --no-deps app
            docker compose up -d --no-deps nginx

            # Wait for app to be healthy
            echo "Waiting for app to start..."
            sleep 15

            # Verify app is responding via nginx
            curl -sf --max-time 10 http://localhost:80 > /dev/null || \
              (echo "App health check failed!" && exit 1)

            # Remove dangling images to free disk space
            docker image prune -f
