events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile        on;
  keepalive_timeout 65;

  # Increase for file uploads
  client_max_body_size 20m;

  # ── HTTP → HTTPS redirect ──────────────────────────────────────────────────
  server {
    listen 80;
    server_name foocaps.com www.foocaps.com;

    # Required for certbot HTTP-01 challenge
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # Rate limiting — protect admin login from brute force
  limit_req_zone $binary_remote_addr zone=admin_login:10m rate=5r/m;

  # ── HTTPS ──────────────────────────────────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name foocaps.com www.foocaps.com;

    ssl_certificate     /etc/letsencrypt/live/foocaps.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/foocaps.com/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Rate limit admin login endpoint
    location = /admin/auth/login {
      limit_req zone=admin_login burst=3 nodelay;
      proxy_pass         http://app:3000;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Proxy to Next.js app
    location / {
      proxy_pass         http://app:3000;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection 'upgrade';
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
    }
  }
}
