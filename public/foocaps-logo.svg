<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 258" fill="none">

  <!-- ── CAP ICON ─────────────────────────────────────────────────────────── -->

  <!-- Dome arc: left base → peak → right base (cubic bezier over the top) -->
  <path
    d="M 288,112 C 296,62 318,18 358,10 C 400,2 430,54 427,108"
    stroke="white" stroke-width="17" stroke-linecap="round" fill="none"
  />

  <!-- Brim: solid wide shape extending to the right -->
  <path
    d="M 252,100 C 256,86 270,80 290,80
       L 426,80
       C 446,80 462,90 462,102
       C 462,114 448,124 432,124
       L 268,124
       C 252,124 248,114 252,100 Z"
    fill="white"
  />

  <!-- F stem: downward stroke below brim (left side) -->
  <path
    d="M 284,124 C 280,144 282,160 286,172"
    stroke="white" stroke-width="17" stroke-linecap="round" fill="none"
  />

  <!-- Top swoosh: decorative arc curving over dome top-right -->
  <path
    d="M 372,13 C 402,4 432,20 438,48 C 442,64 434,80 420,88"
    stroke="white" stroke-width="13" stroke-linecap="round" fill="none"
  />

  <!-- ── FOOCAPS TEXT ─────────────────────────────────────────────────────── -->
  <text
    x="350"
    y="228"
    text-anchor="middle"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="80"
    letter-spacing="3"
    fill="white"
  >FOOCAPS</text>

</svg>
